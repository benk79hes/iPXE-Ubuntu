# =============================================================================
# Ubuntu Preseed configuration (legacy installer — Debian-style)
# Place this file at /srv/ipxe/ubuntu/preseed.cfg on the iPXE server.
#
# IMPORTANT — CUSTOMISE BEFORE DEPLOYING:
#   1. Keyboard layout    (line: keyboard-configuration/xkb-keymap)
#   2. Timezone           (line: time/zone)
#   3. Password hash      (line: passwd/user-password-crypted)
#      Generate with: echo "yourpassword" | mkpasswd -m sha-512 -s
# =============================================================================

# Locale
d-i debian-installer/locale string en_US.UTF-8
# Keyboard layout — change 'us' to your layout (e.g. fr, de, es, gb)
d-i keyboard-configuration/xkb-keymap select us

# Network — use DHCP (the iPXE server provides DHCP on the isolated LAN)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string ubuntu-node
d-i netcfg/get_domain string local

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string archive.ubuntu.com
d-i mirror/http/directory string /ubuntu
d-i mirror/http/proxy string

# Clock
d-i clock-setup/utc boolean true
# Timezone — change to your timezone (e.g. Europe/Paris, America/New_York, Asia/Tokyo)
d-i time/zone string UTC

# Disk partitioning — use entire first disk with LVM
d-i partman-auto/method string lvm
d-i partman-auto/disk string /dev/sda
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# User account
d-i passwd/user-fullname string Admin
d-i passwd/username string admin
# REQUIRED: Replace the hash below with your own.
# Generate with: echo "yourpassword" | mkpasswd -m sha-512 -s
# WARNING: Do NOT deploy with the placeholder hash below.
d-i passwd/user-password-crypted password REPLACE_WITH_HASHED_PASSWORD

# Minimal packages
tasksel tasksel/first multiselect standard, openssh-server

# Extras
d-i pkgsel/include string curl wget vim

# Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string /dev/sda

# Finish
d-i finish-install/reboot_in_progress note
