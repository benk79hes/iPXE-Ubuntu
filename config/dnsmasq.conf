# =============================================================================
# dnsmasq configuration for iPXE server
# Template — actual config is written by install.sh to /etc/dnsmasq.d/ipxe.conf
# Variables in angle brackets are replaced at install time.
# =============================================================================

# Listen only on the isolated LAN interface
interface=<LAN_IFACE>
bind-interfaces

# Do not use /etc/resolv.conf; forward DNS to public resolvers
no-resolv
server=8.8.8.8
server=8.8.4.4

# DHCP range and lease time
dhcp-range=<DHCP_START>,<DHCP_END>,255.255.255.0,12h

# Default gateway and DNS for clients
dhcp-option=option:router,<LAN_IP>
dhcp-option=option:dns-server,<LAN_IP>

# TFTP
enable-tftp
tftp-root=/srv/tftp

# PXE boot — BIOS clients
dhcp-match=set:bios,option:client-arch,0
dhcp-boot=tag:bios,undionly.kpxe,,<LAN_IP>

# PXE boot — UEFI clients
dhcp-match=set:efi64,option:client-arch,7
dhcp-match=set:efi64,option:client-arch,9
dhcp-boot=tag:efi64,ipxe.efi,,<LAN_IP>

# Once iPXE is running, redirect to the HTTP boot script
dhcp-userclass=set:ipxe,iPXE
dhcp-boot=tag:ipxe,http://<LAN_IP>/boot.ipxe
