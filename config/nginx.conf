# =============================================================================
# nginx site template for iPXE HTTP server
# Template — actual file is written by install.sh to
#            /etc/nginx/sites-available/ipxe
# =============================================================================
server {
    listen <LAN_IP>:80;
    server_name _;

    root /srv/ipxe;
    autoindex on;

    location / {
        try_files $uri $uri/ =404;
    }

    # Ubuntu preseed / autoinstall files
    location /ubuntu/ {
        alias /srv/ipxe/ubuntu/;
        autoindex on;
    }

    access_log /var/log/nginx/ipxe_access.log;
    error_log  /var/log/nginx/ipxe_error.log;
}
